name: Build Torch and Torch/XLA Wheels

on:
  workflow_call:
    inputs:
      torch_version:
        description: 'Torch version to build (default: 2.7.0)'
        required: false
        type: string
        default: '2.7.0'
      docker-image:
        description: 'Docker image to use for build'
        required: true
        type: string
    outputs:
      artifact_name:
        description: 'Name of uploaded wheels artifact'
        value: ${{ jobs.build-wheels.outputs.artifact_name }}

jobs:
  build-wheels:
    runs-on: wormhole_b0
    container:
      image: us-central1-docker.pkg.dev/tpu-pytorch-releases/docker/development:tpu
      options: --user root
      volumes:
        - /mnt/dockercache:/mnt/dockercache
    outputs:
      artifact_name: ${{ steps.upload.outputs.artifact_name }}
    steps:
      - name: "Install Python 3.10"
        run: |
          apt-get update && apt-get install -y python3.10 python3.10-dev python3.10-venv
      - name: "Build Torch and Torch/XLA Wheels"
        id: build_wheels
        run: |
          cd /tmp
          git clone --recursive --branch v${{ inputs.torch_version }} https://github.com/pytorch/pytorch.git
          cd pytorch/
          git clone --recursive https://github.com/tenstorrent/pytorch-xla.git xla

          # copy pre-built wheels from cache
          mkdir -p ./dist
          if [ -d /mnt/dockercache/models/tt-ci-models-private/wheels ]; then
            echo "Using pre-built wheels from cache"
            cp -r /mnt/dockercache/models/tt-ci-models-private/wheels/torch*cp310*.whl ./dist/
          else
            echo "No pre-built wheels found in cache, dowloading from PyTorch"
            wget -nH -np -P ./dist https://download.pytorch.org/whl/cpu-cxx11-abi/torch-2.7.0%2Bcpu.cxx11.abi-cp310-cp310-linux_x86_64.whl

            if [ ! -f ./dist/torch-2.7.0+cpu.cxx11.abi-cp310-cp310-linux_x86_64.whl ]; then
              echo "Download failed or file missing!"
              exit 1
            fi
            echo "Downloaded wheel file at: $(realpath ./dist/torch-2.7.0+cpu.cxx11.abi-cp310-cp310-linux_x86_64.whl)"
          fi
          python3.10 setup.py develop

          # Build PyTorch/XLA
          cd xla/
          python3.10 setup.py bdist_wheel

          # Collect wheels
          mkdir -p /dist
          cp dist/*.whl /dist/

      - name: "Upload Wheels Artifact"
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: install-artifact-torch-xla-release
          path: /dist/*.whl
